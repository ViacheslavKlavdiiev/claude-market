name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'scripts/build-site.mjs'
      - 'plugins/**'
      - '.claude-plugin/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — the generator derives "updated" dates from git log
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build the catalog site
        run: node scripts/build-site.mjs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
