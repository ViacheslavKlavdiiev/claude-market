name: Tag plugin releases

on:
  push:
    branches: [main]
    paths: ['plugins/**']

permissions:
  contents: write

concurrency:
  group: tag-releases
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # tags and history are needed to detect what is already released
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Tag new plugin versions and create releases
        run: node scripts/tag-releases.mjs
        env:
          GH_TOKEN: ${{ github.token }}
